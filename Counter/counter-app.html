<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App - React</title>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #root {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .counter-app {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .counter-app h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .count-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 4rem;
            font-weight: bold;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .count-display.high {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.05);
        }

        .count-label {
            font-size: 1.2rem;
            font-weight: normal;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .buttons-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .btn-increment {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-decrement {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-increment:hover {
            background: linear-gradient(135deg, #0d7a6f 0%, #2dd363 100%);
        }

        .btn-decrement:hover {
            background: linear-gradient(135deg, #c20761 0%, #d95800 100%);
        }

        .btn-reset:hover {
            background: linear-gradient(135deg, #3d8ed4 0%, #00c8d4 100%);
        }

        .footer {
            margin-top: 30px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 500px) {
            .counter-app {
                padding: 30px 20px;
            }

            .count-display {
                font-size: 3rem;
                padding: 30px;
            }

            button {
                min-width: 100px;
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // State variable to hold the count value
            const [count, setCount] = useState(0);

            // Handler function to increment count
            const handleIncrement = () => {
                setCount(count + 1);
            };

            // Handler function to decrement count
            const handleDecrement = () => {
                // Bonus: Prevent count from going below 0
                if (count > 0) {
                    setCount(count - 1);
                }
            };

            // Handler function to reset count
            const handleReset = () => {
                setCount(0);
            };

            return (
                <div className="counter-app">
                    <h1>🔢 Counter App</h1>
                    
                    {/* Count Display - Changes color when > 5 (Bonus) */}
                    <div className={`count-display ${count > 5 ? 'high' : ''}`}>
                        <div className="count-label">Count:</div>
                        <div>{count}</div>
                    </div>

                    {/* Three Buttons: Increment, Decrement, Reset */}
                    <div className="buttons-container">
                        <button 
                            className="btn-increment" 
                            onClick={handleIncrement}
                        >
                            ➕ Increment
                        </button>
                        
                        <button 
                            className="btn-decrement" 
                            onClick={handleDecrement}
                        >
                            ➖ Decrement
                        </button>
                        
                        <button 
                            className="btn-reset" 
                            onClick={handleReset}
                        >
                            🔄 Reset
                        </button>
                    </div>
                </div>
            );
        }

        // Render the App component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <div class="footer">
        <p>Built with React | Counter App Assignment</p>
    </div>
</body>
</html>
